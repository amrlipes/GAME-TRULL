<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME TRULL - 2D FIGHTING</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-ui">
        <div id="menu-screen" class="screen">
            <h1 id="game-logo">GAME TRULL</h1>
            <p class="subtitle">Agilidade vs Força</p>
            <button id="start-btn">START GAME</button>
        </div>

        <div id="hud" class="hidden">
            <div class="hp-container left">
                <div class="char-name">STRIKER</div>
                <div class="hp-bar-bg">
                    <div id="p1-hp" class="hp-fill"></div>
                </div>
            </div>
            
            <div id="round-timer">99</div>

            <div class="hp-container right">
                <div class="char-name">TITAN</div>
                <div class="hp-bar-bg">
                    <div id="p2-hp" class="hp-fill"></div>
                </div>
            </div>

            <div id="round-info">
                <span id="p1-wins" class="win-marker"></span>
                <span id="round-text">ROUND 1</span>
                <span id="p2-wins" class="win-marker"></span>
            </div>
        </div>

        <div id="game-announcer" class="hidden">
            <h2 id="announcer-text">FIGHT!</h2>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
